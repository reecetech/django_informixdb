[tox]
;envlist = py39-dj3,py310-dj3,py39-dj4,py310-dj4,py312-dj5,py312-dj6
envlist = py311-dj52


[testenv]
deps =
    pytest
    pytest-cov
    pytest-django
    pytest-mock
    freezegun
    pyodbc<5

    dj4: Django>=4,<5
    dj5: Django>=5,<6
    dj52: Django>=5.2,<6
; 4.2 3.8, 3.9, 3.10, 3.11, 3.12 (added in 4.2.8)
;
; 5.0  3.10, 3.11, 3.12
;
; 5.1 3.10, 3.11, 3.12, 3.13 (added in 5.1.3)
;
; 5.2 3.10, 3.11, 3.12, 3.13, 3.14 (added in 5.2.8)
;
; 6.0 3.12, 3.13, 3.14

commands = 
    pytest -v \
           --cov-report term-missing \
           --cov-fail-under '70' \
           --no-cov-on-fail \
           --cov=django_informixdb \
           {posargs}
passenv =
    INFORMIXDIR
setenv =
    INFORMIXSQLHOSTS={env:INFORMIXDIR:}/etc/sqlhosts
    LD_LIBRARY_PATH={env:INFORMIXDIR:}/lib/esql
